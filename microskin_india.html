// v5 Financial Model
const M={
  retail:6500,wholesale:2300.5,consultFee:500,
  clinicDays:17,consPerDay:3,churn:0.22,ppy:3.5,fx:107,
  tiers:{
    1:{label:"Mega Metro",baseClients:150,mult:1.25},
    2:{label:"Tier 1+",baseClients:130,mult:1.22},
    3:{label:"Tier 1 City",baseClients:120,mult:1.20},
    4:{label:"Tier 2 City",baseClients:90,mult:1.15},
  },
  scen:{conservative:{c:0.75,p:0.85},base:{c:1,p:1},aggressive:{c:1.25,p:1.15}},
};

function calcT(cityTier,pw,scen="base"){
  const t=M.tiers[cityTier],s=M.scen[scen];
  const clients=Math.round(t.baseClients*pw*s.c);
  const retained=Math.round(clients*(1-M.churn)),churned=clients-retained;
  const bottles=Math.round(retained*M.ppy*s.p+churned*1);
  const revenue=bottles*M.retail,gp=revenue-bottles*M.wholesale;
  const consult=M.clinicDays*M.consPerDay*12*M.consultFee;
  const income=Math.round(gp+consult);
  const fee=Math.round(income*t.mult);
  return{clients,bottles,revenue:Math.round(revenue),gp:Math.round(gp),
    consult:Math.round(consult),income,fee,feeGBP:Math.round(fee/M.fx)};
}

    "pun-2":[[18.58,73.88],[18.58,74.02],[18.52,74.02],[18.52,73.88]],
    "pun-3":[[18.60,73.72],[18.60,73.82],[18.54,73.82],[18.54,73.72]],
    "pun-4":[[18.70,73.72],[18.70,74.02],[18.60,74.02],[18.60,73.72]],
  },
};


// ── REACT APP ────────────────────────────────────────────────────────────────
function App(){
  const [selectedCity,setSelectedCity]=useState(null);
  const [selectedTerritory,setSelectedTerritory]=useState(null);
  const [activePhases,setActivePhases]=useState({1:true,2:true,3:true,4:true});
  const [scen,setScen]=useState("base");
  const [mapView,setMapView]=useState("india"); // "india" | "city"
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const layersRef=useRef([]);

  const visibleCities=useMemo(()=>CITIES.filter(c=>activePhases[c.phase]),[activePhases]);

  function togglePhase(p){
    setActivePhases(prev=>({...prev,[p]:!prev[p]}));
  }

  // Init map
  useEffect(()=>{
    if(leafRef.current) return;
    const m=L.map(mapRef.current,{zoomControl:true,attributionControl:true});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      attribution:'&copy;<a href="https://www.openstreetmap.org">OSM</a> &copy;<a href="https://carto.com">CARTO</a>',
      maxZoom:18,subdomains:"abcd"
    }).addTo(m);
    m.setView([20.5,78.5],5);
    leafRef.current=m;
    return ()=>{m.remove();leafRef.current=null;};
  },[]);

  // Render map elements
  useEffect(()=>{
    const m=leafRef.current;
    if(!m) return;
    // Clear old layers
    layersRef.current.forEach(l=>{try{m.removeLayer(l);}catch(e){}});
    layersRef.current=[];

    if(mapView==="india"){
      // Show city markers for all visible cities
      visibleCities.forEach(city=>{
        const color=PHASE_COLORS[city.phase];
        const r=city.phase===1?12:city.phase===2?10:city.phase===3?8:7;
        const mk=L.circleMarker([city.lat,city.lng],{
          radius:r,color:"#fff",weight:1.5,fillColor:color,fillOpacity:0.85
        }).addTo(m);
        mk.bindTooltip(`<b>${city.name}</b><br><span style="color:${color};font-size:10px">Phase ${city.phase} · ${city.territories.length} ${city.territories.length===1?"territory":"territories"}</span>`,{sticky:true});
        mk.on("click",()=>{
          setSelectedCity(city);
          setSelectedTerritory(null);
          if(city.phase===1){
            setMapView("city");
            const poly=TERRITORY_POLYGONS[city.id];
            if(poly){
              const allPts=Object.values(poly).flat();
              const bounds=L.latLngBounds(allPts.map(p=>L.latLng(p[0],p[1])));
              m.fitBounds(bounds.pad(0.1));
            } else {
              m.setView([city.lat,city.lng],12);
            }
          }
        });
        layersRef.current.push(mk);
      });
    } else if(mapView==="city" && selectedCity){
      // Show territory polygons for selected Phase 1 city
      const polyData=TERRITORY_POLYGONS[selectedCity.id];
      if(polyData){
        selectedCity.territories.forEach(terr=>{
          const coords=polyData[terr.id];
          if(!coords) return;
          const color=PHASE_COLORS[selectedCity.phase];
          const isSelected=selectedTerritory&&selectedTerritory.id===terr.id;
          const poly=L.polygon(coords,{
            color:color,weight:isSelected?3:1.5,
            fillColor:color,fillOpacity:isSelected?0.45:0.2,
            dashArray:isSelected?null:"4,4"
          }).addTo(m);
          const fin=calcT(selectedCity.cityTier,terr.pw,scen);
          poly.bindTooltip(`<b>${terr.name}</b><br>
            <span style="font-size:10px;color:#555">${terr.corridors}</span><br>
            <b style="color:#1a1f3c">${fmt(fin.fee)} franchise fee</b>`,{sticky:true});
          poly.on("click",()=>setSelectedTerritory({...terr,cityId:selectedCity.id}));
          layersRef.current.push(poly);
        });
      }
    }
  },[visibleCities,mapView,selectedCity,selectedTerritory,scen]);

  const fin=selectedTerritory
    ?calcT(selectedCity.cityTier,selectedTerritory.pw,scen)
    :null;

  const finC=selectedTerritory?calcT(selectedCity.cityTier,selectedTerritory.pw,"conservative"):null;
  const finA=selectedTerritory?calcT(selectedCity.cityTier,selectedTerritory.pw,"aggressive"):null;

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
      {/* Header */}
      <div style={{background:"#1a1f3c",color:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{fontWeight:800,fontSize:15,letterSpacing:"-0.3px"}}>MICROSKIN INDIA</div>
        <div style={{height:16,width:1,background:"rgba(255,255,255,0.2)"}}/>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.65)"}}>Franchise Territory Explorer · v5 Data</div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {/* Phase toggles */}
          {[1,2,3,4].map(p=>(
            <button key={p} onClick={()=>togglePhase(p)}
              style={{padding:"3px 10px",borderRadius:12,border:`1.5px solid ${PHASE_COLORS[p]}`,
                background:activePhases[p]?PHASE_COLORS[p]:"transparent",
                color:activePhases[p]?"#fff":PHASE_COLORS[p],
                fontSize:10,fontWeight:700,cursor:"pointer",transition:"all .2s"}}>
              P{p}
            </button>
          ))}
          {/* Scenario */}
          <select value={scen} onChange={e=>setScen(e.target.value)}
            style={{marginLeft:8,padding:"3px 8px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",
              background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:11,cursor:"pointer"}}>
            <option value="conservative">Conservative</option>
            <option value="base">Base Case</option>
            <option value="aggressive">Aggressive</option>
          </select>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:300,background:C.surface,borderRight:`1px solid ${C.border}`,
          display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>

          {/* City/Territory nav */}
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:6,alignItems:"center"}}>
            {mapView==="city" && (
              <button onClick={()=>{setMapView("india");setSelectedCity(null);setSelectedTerritory(null);
                leafRef.current&&leafRef.current.setView([20.5,78.5],5);}}
                style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${C.border}`,
                  background:C.surfaceHi,fontSize:11,cursor:"pointer",color:C.muted}}>
                ← All India
              </button>
            )}
            <div style={{fontSize:12,fontWeight:600,color:C.text}}>
              {mapView==="india"?`${visibleCities.length} cities visible`
                :selectedCity?selectedCity.name:""}
            </div>
          </div>

          {/* City list / territory list */}
          <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
            {mapView==="india" ? (
              [1,2,3,4].map(phase=>{
                const pCities=visibleCities.filter(c=>c.phase===phase);
                if(!pCities.length) return null;
                return(
                  <div key={phase}>
                    <div style={{padding:"6px 12px 3px",fontSize:10,fontWeight:700,
                      color:PHASE_COLORS[phase],textTransform:"uppercase",letterSpacing:".5px"}}>
                      Phase {phase}
                    </div>
                    {pCities.map(city=>(
                      <div key={city.id}
                        onClick={()=>{setSelectedCity(city);setSelectedTerritory(null);
                          if(city.phase===1){setMapView("city");
                            const poly=TERRITORY_POLYGONS[city.id];
                            if(poly){
                              const allPts=Object.values(poly).flat();
                              const bounds=L.latLngBounds(allPts.map(p=>L.latLng(p[0],p[1])));
                              leafRef.current&&leafRef.current.fitBounds(bounds.pad(0.1));
                            } else leafRef.current&&leafRef.current.setView([city.lat,city.lng],12);
                          }
                        }}
                        style={{padding:"7px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
                          background:selectedCity&&selectedCity.id===city.id?C.surfaceHi:"transparent",
                          borderLeft:selectedCity&&selectedCity.id===city.id?`3px solid ${PHASE_COLORS[city.phase]}`:"3px solid transparent"}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:PHASE_COLORS[city.phase],flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:C.text}}>{city.name}</div>
                          <div style={{fontSize:10,color:C.muted}}>{city.state} · {city.territories.length} {city.territories.length===1?"territory":"territories"}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })
            ) : selectedCity ? (
              <div>
                <div style={{padding:"6px 12px 3px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>
                  Territories
                </div>
                {selectedCity.territories.map(t=>{
                  const f=calcT(selectedCity.cityTier,t.pw,scen);
                  const isSelected=selectedTerritory&&selectedTerritory.id===t.id;
                  return(
                    <div key={t.id}
                      onClick={()=>setSelectedTerritory({...t,cityId:selectedCity.id})}
                      style={{padding:"8px 12px",cursor:"pointer",
                        background:isSelected?C.surfaceHi:"transparent",
                        borderLeft:isSelected?`3px solid ${PHASE_COLORS[selectedCity.phase]}`:"3px solid transparent"}}>
                      <div style={{fontSize:11,fontWeight:600,color:C.text}}>{t.name.replace(selectedCity.name+" – ","")}</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:1}}>{t.corridors.substring(0,55)}…</div>
                      <div style={{fontSize:11,fontWeight:700,color:PHASE_COLORS[selectedCity.phase],marginTop:3}}>
                        {fmt(f.fee)} <span style={{fontWeight:400,color:C.muted,fontSize:10}}>franchise fee</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : null}
          </div>

          {/* Summary stats */}
          <div style={{padding:"10px 12px",borderTop:`1px solid ${C.border}`,background:C.surfaceHi}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600}}>PORTFOLIO SUMMARY</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
              {[1,2,3,4].map(p=>{
                const cities=CITIES.filter(c=>c.phase===p);
                const terrs=cities.reduce((s,c)=>s+c.territories.length,0);
                return(
                  <div key={p} style={{fontSize:10}}>
                    <span style={{color:PHASE_COLORS[p],fontWeight:700}}>P{p}</span>
                    <span style={{color:C.muted}}> {cities.length}c / {terrs}t</span>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>
              Total: {CITIES.length} cities · {CITIES.reduce((s,c)=>s+c.territories.length,0)} territories
            </div>
          </div>
        </div>

        {/* Map */}
        <div style={{flex:1,position:"relative",display:"flex",flexDirection:"column"}}>
          <div ref={mapRef} style={{flex:1}}/>

          {/* Phase legend */}
          <div style={{position:"absolute",bottom:20,left:12,background:"rgba(255,255,255,0.96)",
            borderRadius:10,padding:"8px 12px",boxShadow:"0 2px 12px rgba(0,0,0,0.12)",zIndex:1000}}>
            {[1,2,3,4].map(p=>(
              <div key={p} style={{display:"flex",alignItems:"center",gap:6,marginBottom:p<4?3:0}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:PHASE_COLORS[p]}}/>
                <span style={{fontSize:10,color:C.muted}}>{PHASE_LABELS[p].split("—")[0].trim()}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Territory detail panel */}
        {selectedTerritory && fin && (
          <div style={{width:280,background:C.surface,borderLeft:`1px solid ${C.border}`,
            overflowY:"auto",flexShrink:0}}>
            <div style={{padding:"12px 14px",background:PHASE_COLORS[selectedCity.phase],color:"#fff"}}>
              <div style={{fontSize:11,opacity:.8,marginBottom:2}}>{selectedCity.name}</div>
              <div style={{fontSize:14,fontWeight:700,lineHeight:1.3}}>{selectedTerritory.name}</div>
            </div>
            <div style={{padding:"12px 14px"}}>
              <Sect label="Primary Clinic Corridor" value={selectedTerritory.corridors}/>
              <Sect label="Areas Covered" value={selectedTerritory.areas}/>
              <div style={{height:1,background:C.border,margin:"10px 0"}}/>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>
                Financial Projections — {scen.charAt(0).toUpperCase()+scen.slice(1)}
              </div>
              <Row label="Active Clients (steady-state)" val={fin.clients.toLocaleString()}/>
              <Row label="Annual Bottle Sales" val={fin.bottles.toLocaleString()}/>
              <Row label="Annual Revenue" val={fmt(fin.revenue)} hi/>
              <Row label="Product Gross Profit" val={fmt(fin.gp)}/>
              <Row label="Consultation Income" val={fmt(fin.consult)}/>
              <Row label="Total Franchisee Income" val={fmt(fin.income)} hi/>
              <div style={{height:1,background:C.border,margin:"10px 0"}}/>
              <div style={{background:PHASE_COLORS[selectedCity.phase]+"15",borderRadius:8,padding:"10px 12px",
                border:`1px solid ${PHASE_COLORS[selectedCity.phase]}40`}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600}}>RECOMMENDED FRANCHISE FEE</div>
                <div style={{fontSize:20,fontWeight:800,color:PHASE_COLORS[selectedCity.phase]}}>{fmt(fin.fee)}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:1}}>{fmtGBP(fin.feeGBP)} · {selectedCity.cityTier===1?"1.25":selectedCity.cityTier===2?"1.22":selectedCity.cityTier===3?"1.20":"1.15"}× income multiple</div>
              </div>
              <div style={{height:1,background:C.border,margin:"10px 0"}}/>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Scenario Range</div>
              <div style={{display:"flex",gap:6}}>
                {["conservative","base","aggressive"].map(s=>{
                  const f=calcT(selectedCity.cityTier,selectedTerritory.pw,s);
                  return(
                    <div key={s} style={{flex:1,background:s===scen?PHASE_COLORS[selectedCity.phase]+"15":C.surfaceHi,
                      borderRadius:6,padding:"6px 8px",border:s===scen?`1px solid ${PHASE_COLORS[selectedCity.phase]}50`:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,color:C.muted,textTransform:"uppercase"}}>{s.slice(0,4)}</div>
                      <div style={{fontSize:11,fontWeight:700,color:C.text,marginTop:2}}>{fmt(f.fee)}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:12,padding:"8px",background:C.surfaceHi,borderRadius:6,fontSize:10,color:C.muted}}>
                <b>Partner Weight:</b> {selectedTerritory.pw}× city baseline<br/>
                <b>City Accessible Partners:</b> {selectedCity.accessible.toLocaleString()}<br/>
                <b>Model:</b> v5 · ₹{M.retail.toLocaleString()} retail · {M.clinicDays} clinic days/mo
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Sect({label,value}){
  return(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:9,fontWeight:700,color:"#8c95a8",textTransform:"uppercase",letterSpacing:".4px"}}>{label}</div>
      <div style={{fontSize:11,color:"#1a1f3c",marginTop:2,lineHeight:1.4}}>{value}</div>
    </div>
  );
}
function Row({label,val,hi}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"4px 0",borderBottom:"1px solid #f0f4f8"}}>
      <span style={{fontSize:10,color:"#5c6478"}}>{label}</span>
      <span style={{fontSize:hi?12:11,fontWeight:hi?700:500,color:hi?"#1a1f3c":"#5c6478"}}>{val}</span>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script></body></html>
